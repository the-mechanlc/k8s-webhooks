apiVersion: v1
kind: Service
metadata:
  name: webhook-svc          # MUST match the SAN in the TLS cert: webhook-svc.default.svc
  namespace: default
spec:
  selector:
    app: webhook-server       # Routes traffic to pods with this label
  ports:
    - name: https
      port: 443               # Service port — what the API server calls
      targetPort: 8443        # Container port — what our Go server listens on
  type: ClusterIP             # Only reachable inside the cluster (API server → webhook)
