apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: team-label-validator
webhooks:
  - name: validate-team-label.k8s-webhooks.local
    # Which requests trigger this webhook
    rules:
      - operations: ["CREATE"]          # Fire on pod CREATE only (not updates)
        apiGroups: [""]                  # "" = core API group
        apiVersions: ["v1"]
        resources: ["pods"]
    # How to reach our webhook server
    clientConfig:
      service:
        name: webhook-svc               # Service name (must match cert SAN)
        namespace: default
        path: /validate                 # Our handler endpoint
      # base64-encoded CA cert so the API server can verify our TLS cert
      caBundle: 
    # IGNORE during development — if webhook is down, pods can still be created.
    # Switch to "Fail" once stable (blocks all pod creation if webhook unreachable).
    failurePolicy: Ignore
    # sideEffects: None is required for webhooks that don't mutate anything
    sideEffects: None
    admissionReviewVersions: ["v1"]
    # Scope: Namespaced means only applies to namespaced resources (not cluster-scoped)
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system    # Never intercept system namespace — would break k8s itself
            - kube-public
